{{define "content"}}
<div class="card">
    <h2>创建视频任务</h2>
    <form id="task-form" hx-post="/api/v1/tasks"
          hx-target="#task-result"
          hx-swap="innerHTML">
        <input type="hidden" name="client_token" id="client-token" value="{{newUUID}}">

<script>
// 防重复提交状态管理
var _submitting = false;

document.addEventListener('htmx:configRequest', function(evt) {
    if (evt.target.id !== 'task-form') return;
    if (_submitting) {
        evt.preventDefault(); // 阻止重复提交
        return;
    }
    _submitting = true;
    // 禁用提交按钮，防止连点
    var btn = document.getElementById('submit-btn');
    if (btn) {
        btn.disabled = true;
        btn.textContent = '提交中...';
    }
});

document.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.target.id !== 'task-form') return;
    var result = document.getElementById('task-result');
    if (evt.detail.successful) {
        result.innerHTML = '<div style="padding:12px;border:2px solid #000;background:#000;color:#fff">TASK SUBMITTED</div>';
        if (window.htmx) htmx.ajax('GET', '/tasks/list', '#task-list-container');
    } else {
        var msg = 'SUBMIT FAILED';
        try {
            var resp = JSON.parse(evt.detail.xhr.responseText);
            if (resp.error) msg = resp.error;
        } catch(e) {}
        result.innerHTML = '<div style="padding:12px;border:2px solid #000;background:#fff;color:#000;font-weight:700">' + msg + '</div>';
    }
    // 5 秒内禁止再次提交（服务端幂等窗口 + 前端防抖双保险）
    // 注意：不再立即刷新 client_token，同一 token 在 60 秒内被服务端拦截
    setTimeout(function() {
        _submitting = false;
        var btn = document.getElementById('submit-btn');
        if (btn) {
            btn.disabled = false;
            btn.textContent = '提交任务';
        }
        // 延迟刷新 token，确保下次提交使用新 token
        try {
            document.getElementById('client-token').value = crypto.randomUUID();
        } catch(e) {
            document.getElementById('client-token').value = Date.now() + '-' + Math.random().toString(36).slice(2);
        }
    }, 5000);
});
</script>

        <div class="form-group">
            <label>视频主题 *</label>
            <div style="display:flex;gap:8px;">
                <input type="text" name="subject" id="subject-input" placeholder="例如：生命的意义是什么" required style="flex:1;">
                <button type="button" class="btn btn-primary" id="gen-script-btn"
                        onclick="generateScript()" style="white-space:nowrap;">
                    ✨ AI 生成文案
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>视频文案（可手动编辑，留空则自动生成）</label>
            <textarea name="script" id="script-textarea" rows="6" placeholder="点击「AI 生成文案」自动生成，或直接输入自定义文案"></textarea>
            <div id="script-status" style="margin-top:4px;font-size:0.8rem;color:#000;"></div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>语言</label>
                <select name="language">
                    <option value="zh-CN">中文</option>
                    <option value="en-US">English</option>
                </select>
            </div>
            <div class="form-group">
                <label>视频尺寸</label>
                <select name="aspect">
                    <option value="9:16">竖屏 9:16 (1080×1920)</option>
                    <option value="16:9">横屏 16:9 (1920×1080)</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>语音</label>
                <select name="voice_name">
                    <option value="zh-CN-XiaoyiNeural">晓晓 (女)</option>
                    <option value="zh-CN-YunxiNeural">云希 (男)</option>
                    <option value="zh-CN-YunjianNeural">云健 (男)</option>
                </select>
            </div>
            <div class="form-group">
                <label>语速调整</label>
                <input type="range" name="voice_rate" min="-50" max="100" value="0">
            </div>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" name="subtitle_enabled" checked> 启用字幕
            </label>
        </div>

        {{if .MaterialSources}}
        <div class="form-group">
            <label>素材来源</label>
            <div style="display:flex;flex-wrap:wrap;gap:12px;">
                {{range $i, $v := .MaterialSources}}
                <label style="display:inline-flex;align-items:center;gap:6px;font-weight:400;text-transform:none;letter-spacing:0;margin-bottom:0;">
                    <input type="radio" name="material_source" value="{{$v}}" {{if eq $i 0}}checked{{end}}>
                    {{if eq $v "pexels"}}
                        搜索视频素材 (Pexels)
                    {{else if eq $v "pixabay"}}
                        搜索视频素材 (Pixabay)
                    {{else if eq $v "aliyun_image"}}
                        AI 生成图片 (Z-Image)
                    {{else if eq $v "local"}}
                        本地素材
                    {{else}}
                        {{$v}}
                    {{end}}
                </label>
                {{end}}
            </div>
            {{if .ImageConfig}}
            <div id="image-estimate" style="margin-top:8px;padding:10px;background:#fff;border:2px solid #000;font-size:0.85rem;display:none;">
                <div id="estimate-content"></div>
            </div>
            {{end}}
        </div>
        {{end}}

        <input type="hidden" name="bgm_enabled" value="on">

        <button type="submit" class="btn btn-danger" id="submit-btn" style="width:100%;padding:12px;font-size:1rem;text-transform:uppercase;letter-spacing:1px;">
            提交任务
        </button>
    </form>

    <div id="task-result" style="margin-top:16px;"></div>
</div>

<script>
async function generateScript() {
    const subject = document.getElementById('subject-input').value.trim();
    const language = document.querySelector('[name="language"]').value;
    const paragraphs = 5;
    const btn = document.getElementById('gen-script-btn');
    const textarea = document.getElementById('script-textarea');
    const status = document.getElementById('script-status');

    if (!subject) {
        status.textContent = '请先输入视频主题';
        status.style.color = '#000';
        return;
    }

    btn.disabled = true;
    btn.textContent = '生成中...';
    status.textContent = '正在调用 AI 生成文案，请稍候...';
    status.style.color = '#000';

    try {
        const resp = await fetch('/api/v1/llm/generate-script', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({subject, language, paragraph_number: paragraphs})
        });
        const data = await resp.json();
        if (data.error) {
            status.textContent = 'ERROR: ' + data.error;
            status.style.color = '#000';
        } else {
            textarea.value = data.script;
            status.textContent = '文案生成完成，可在下方编辑';
            status.style.color = '#000';
        }
    } catch(e) {
        status.textContent = '请求失败: ' + e.message;
        status.style.color = '#000';
    } finally {
        btn.disabled = false;
        btn.textContent = '✨ AI 生成文案';
    }
}
</script>

{{if .ImageConfig}}
<script>
// AI 图片生成预估
const IMAGE_CONFIG = {
    imageCount: {{.ImageConfig.ImageCount}},
    clipSeconds: {{.ImageConfig.ClipSeconds}},
    pricePerUSD: {{.ImageConfig.PricePerUSD}}
};

function updateImageEstimate() {
    const estimateDiv = document.getElementById('image-estimate');
    if (!estimateDiv) return;

    const selectedSource = document.querySelector('input[name="material_source"]:checked');
    if (!selectedSource || selectedSource.value !== 'aliyun_image') {
        estimateDiv.style.display = 'none';
        return;
    }
    estimateDiv.style.display = 'block';

    const script = document.getElementById('script-textarea').value.trim();
    if (!script) {
        document.getElementById('estimate-content').innerHTML =
            '<span style="color:#000;">填写文案后可预估图片数量和费用</span>';
        return;
    }

    // 估算音频时长：中文约 4 字/秒，英文约 15 字符/秒
    const chineseChars = (script.match(/[一-龥]/g) || []).length;
    const otherChars = script.length - chineseChars;
    const estimatedDuration = chineseChars / 4 + otherChars / 15;

    // 估算关键词数量（按段落数，默认每段 1 个关键词）
    const paragraphs = script.split(/\n+/).filter(p => p.trim().length > 0);
    const numTerms = Math.max(paragraphs.length, 5);

    // 计算需要的图片数
    const totalClipsNeeded = Math.ceil(estimatedDuration / IMAGE_CONFIG.clipSeconds) + 1;
    let clipsPerTerm = IMAGE_CONFIG.imageCount;
    if (numTerms * clipsPerTerm < totalClipsNeeded) {
        clipsPerTerm = Math.ceil(totalClipsNeeded / numTerms);
    }
    const totalImages = numTerms * clipsPerTerm;
    const costUSD = totalImages * IMAGE_CONFIG.pricePerUSD;
    const costCNY = (costUSD * 7.2).toFixed(2);

    document.getElementById('estimate-content').innerHTML = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;">
            <span style="color:#000;">预估音频时长</span><span><b>${Math.round(estimatedDuration)}秒</b>（${Math.round(estimatedDuration/60)}分钟）</span>
            <span style="color:#000;">关键词数量</span><span><b>${numTerms}</b> 个</span>
            <span style="color:#000;">每关键词图片</span><span><b>${clipsPerTerm}</b> 张 × ${IMAGE_CONFIG.clipSeconds}秒/张</span>
            <span style="color:#000;">图片总数</span><span><b>${totalImages}</b> 张</span>
            <span style="color:#000;">预估费用</span><span><b>$${costUSD.toFixed(2)}</b> ≈ ¥${costCNY}</span>
        </div>
        <div style="margin-top:6px;font-size:0.75rem;">
            * Z-Image Turbo 单价 $${IMAGE_CONFIG.pricePerUSD}/张，实际费用以阿里云账单为准
        </div>
    `;
}

// 监听素材来源变化
document.querySelectorAll('input[name="material_source"]').forEach(radio => {
    radio.addEventListener('change', updateImageEstimate);
});

// 监听文案变化
const scriptTextarea = document.getElementById('script-textarea');
if (scriptTextarea) {
    scriptTextarea.addEventListener('input', updateImageEstimate);
}

// 初始化
updateImageEstimate();
</script>
{{end}}

<div id="task-list-container">
    <div class="card">
        <h2>任务列表</h2>
        <div hx-get="/tasks/list" hx-trigger="load, every 10s" hx-swap="innerHTML">
            加载中...
        </div>
    </div>
</div>
{{end}}
