version: '3.8'

services:
  moneyprinter:
    build: .
    container_name: moneyprinter
    ports:
      - "8080:8080"
    volumes:
      # 挂载配置文件（修改后重启容器生效）
      - ./config.toml:/app/config.toml
      # 挂载数据目录（持久化任务队列和视频输出）
      - mpf-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mpf-data:
